name: Build apk

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      build_variant:
        description: "Variant to build (e.g., qaRelease)"
        type: string
        default: "qaRelease"
    outputs:
      artifact-name:
        description: "Generated APK artifact name"
        value: ${{ jobs.build_apk.outputs.artifact-name }}

jobs:

  # Builds the app with QA variant and publish the apk
  build_apk:
    name: Build APK
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.set-outputs.outputs.artifact-name }}

    steps:
      - name: Checkout current repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Clone external repo
        run: git clone https://github.com/owncloud/android.git android-app

      - name: Setup JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a #v5.5.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 #v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK
        working-directory: android-app
        run: ./gradlew clean assemble${{ inputs.build_variant }}

      - name: Set artifact name
        id: set-outputs
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          COMMIT=$(git rev-parse --short HEAD)
          NAME="ownCloud${{ inputs.build_variant }}-${COMMIT}-${DATE}.apk"
          cp ./android-app/owncloudApp/build/outputs/apk/qa/release/owncloud_*-qa-release*.apk ./$NAME
          echo "artifact-name=$NAME" >> $GITHUB_OUTPUT
          ls -al .

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: ${{ steps.set-outputs.outputs.artifact-name }}
          path: ./${{ steps.set-outputs.outputs.artifact-name }}
